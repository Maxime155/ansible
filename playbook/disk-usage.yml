- hosts: "{{ hosts }}"
  tasks:
    - name: Get disk usage
	command: df -h
	register: disk_usage
    - name: Check disk space available
	shell: df -h  / | awk 'NR==2 {print $5}'
	register: disk_usage
	# Send Discord message wehn reboot is required
    - name: Send Discord message
	uri:
	  url: "https://discord.com/api/webhooks/1121467127665274960/LNeysEz8XuEit4tOV2oNVN4-b9MRGYsL0op5zNaqc1sFOClzujxS3Vf6vki6onsblv2Q"
	  method: POST
	  body_format: json
	  body: '{"content": "Disk space on {{ inventory_hostname }} is above 80%!"}'
	  headers:
	    Content-Type: application/json
	  status_code: 204
	 when: disk_usage.stdout[:-1]|int > 80
